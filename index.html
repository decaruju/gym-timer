<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Training Timer</title>
  <link rel="stylesheet" href="styles.css?v=40" />
  <link rel="manifest" href="manifest.json?v=40" crossorigin="use-credentials" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <meta name="theme-color" content="#0f1115" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Trainer" />
</head>
<body>
  <header>
    <h1>Training Timer <span class="app-ver">v1.22</span></h1>
    <nav>
      <button data-view="schedule" class="active">Schedule</button>
      <button data-view="trainings">Trainings</button>
      <button data-view="history">History</button>
      <button data-view="run" hidden>Run</button>
      <button id="install-btn" hidden>Install</button>
    </nav>
  </header>

  <main>
   <div id="swiper" class="swiper active">
    <!-- SCHEDULE VIEW -->
    <section id="view-schedule" class="view swipe-view">
      <div class="toolbar">
        <h2>Schedule</h2>
        <button id="add-slot">+ Add slot</button>
      </div>
      <div id="next-up" class="next-up"></div>
      <div id="calendar" class="calendar"></div>
      <h3 class="section-h">Weekly recurring</h3>
      <div id="schedule-list" class="card-list"></div>
      <p class="hint">Reminders use browser notifications. <button id="enable-notif">Enable notifications</button></p>
    </section>

    <!-- TRAININGS VIEW -->
    <section id="view-trainings" class="view swipe-view">
      <div class="toolbar">
        <h2>Trainings</h2>
        <button id="add-training">+ New training</button>
      </div>
      <div id="training-list" class="card-list"></div>
    </section>

    <!-- HISTORY VIEW -->
    <section id="view-history" class="view swipe-view">
      <div class="toolbar"><h2>Your progress</h2></div>
      <div id="stats-cards" class="stats-cards"></div>
      <div id="freeze-row" class="row" style="margin: 0.5rem 0;"></div>
      <h3 class="section-h">Achievements</h3>
      <div id="achievements" class="achievements"></div>
      <h3 class="section-h">Recent sessions</h3>
      <div id="history-list" class="card-list"></div>
      <h3 class="section-h">Settings</h3>
      <label class="row" style="gap: 0.5rem;">
        <span>Prep countdown</span>
        <input type="number" id="prep-delay" min="0" max="60" step="1" style="width: 80px;" />
        <span class="hint">seconds before each exercise</span>
      </label>

      <h3 class="section-h">Data</h3>
      <div class="row">
        <button id="export-data">Export JSON</button>
        <button id="import-data">Import JSON</button>
        <input type="file" id="import-file" accept="application/json,.json" hidden />
      </div>
      <p class="hint">Back up or migrate your trainings, schedule, and history.</p>
    </section>

    <!-- RUN VIEW (swipeable; hidden when no active run) -->
    <section id="view-run" class="view swipe-view run-view swipe-hidden">
      <div class="run-header">
        <button class="back" id="stop-run">✕ Stop</button>
        <div id="run-title"></div>
      </div>
      <div id="run-step" class="run-step">
        <div id="run-label" class="run-label"></div>
        <div id="run-sub" class="run-sub"></div>
        <div id="run-timer" class="run-timer">—</div>
        <div class="run-actions">
          <button id="run-pause">Pause</button>
          <button id="run-next">Next / Done</button>
        </div>
        <div id="run-upcoming" class="run-upcoming"></div>
      </div>
    </section>

   </div>

    <!-- TRAINING EDITOR -->
    <section id="view-editor" class="view">
      <div class="toolbar">
        <button class="back" id="editor-back">← Back</button>
        <input id="editor-name" placeholder="Training name" />
        <button id="delete-training" class="danger">Delete</button>
      </div>
      <div id="editor-exercises"></div>
      <button id="add-exercise" class="wide">+ Add exercise</button>
    </section>
  </main>

  <div id="toast" class="toast" hidden></div>

  <script src="app.js?v=40"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const reg = await navigator.serviceWorker.register('service-worker.js');
          // Auto-reload once a brand-new SW takes control (after first install + activation).
          let reloading = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (reloading) return;
            reloading = true;
            location.reload();
          });
          // Periodically check for updates while the app is open.
          setInterval(() => reg.update().catch(() => {}), 60 * 1000);
        } catch (e) { console.warn('SW registration failed', e); }
      });
    }
  </script>
</body>
</html>
